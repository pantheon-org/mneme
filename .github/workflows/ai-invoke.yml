name: '▶️ AI Invoke'

on:
  workflow_dispatch:
    inputs:
      issue_number:
        type: 'string'
        description: 'Issue number to invoke on'
        required: true
      additional_context:
        type: 'string'
        description: 'Optional free-text request'
        required: false
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Free-text request (comment trigger only)'
        required: false
      trigger:
        type: 'string'
        description: "'comment' for ad-hoc @gemini-cli requests, 'plan' for priority queue"
        required: false
        default: 'comment'
      issue_number:
        type: 'string'
        description: 'Issue number to plan (plan trigger only; overrides event context)'
        required: false

concurrency:
  group: '${{ github.workflow }}-invoke-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

jobs:
  invoke:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 30
    permissions:
      contents: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout Code'
        uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4
        with:
          fetch-depth: 0

      - name: 'Authenticate GitHub CLI'
        run: 'echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token'

      - name: 'Fetch issue'
        id: 'issue'
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          ISSUE_NUMBER: '${{ inputs.issue_number || github.event.issue.number }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) { core.setOutput('title', ''); core.setOutput('body', ''); return; }
            const { data } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            core.setOutput('title', data.title);
            core.setOutput('body', data.body || '');

      - name: 'Build prompt'
        id: 'build-prompt'
        uses: './.github/actions/build-prompt'
        with:
          workflow:           'invoke'
          trigger:            '${{ inputs.trigger || ''comment'' }}'
          issue_number:       '${{ inputs.issue_number || github.event.pull_request.number || github.event.issue.number }}'
          repository:         '${{ github.repository }}'
          additional_context: '${{ inputs.additional_context }}'
          event_name:         '${{ github.event_name }}'
          title:              '${{ steps.issue.outputs.title || github.event.pull_request.title }}'

      - name: 'Run AI'
        id: 'ai'
        uses: './.github/actions/ai-run'
        with:
          provider_order:     '${{ vars.AI_PROVIDER_ORDER }}'
          prompt:             '${{ steps.build-prompt.outputs.prompt }}'
          gemini_api_key:     '${{ secrets.GEMINI_API_KEY }}'
          gemini_model:       '${{ vars.GEMINI_MODEL || ''gemini-2.5-pro'' }}'
          anthropic_api_key:  '${{ secrets.ANTHROPIC_API_KEY }}'
          anthropic_model:    '${{ vars.ANTHROPIC_MODEL || ''claude-sonnet-4-6'' }}'
          cerebras_api_key:   '${{ secrets.CEREBRAS_API_KEY }}'
          cerebras_model:     '${{ vars.CEREBRAS_MODEL || ''gpt-oss-120b'' }}'
          mistral_api_key:    '${{ secrets.MISTRAL_API_KEY }}'
          mistral_model:      '${{ vars.MISTRAL_MODEL || ''mistral-large-latest'' }}'

      - name: 'Post comment'
        if: "steps.ai.outcome == 'success'"
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          SUMMARY:      '${{ steps.ai.outputs.summary }}'
          BACKEND:      '${{ steps.ai.outputs.backend_used }}'
          ISSUE_NUMBER: '${{ inputs.issue_number || github.event.issue.number }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `${process.env.SUMMARY}\n\n---\n*${process.env.BACKEND}*`,
            });

      - name: 'Write job summary'
        if: always()
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          AI_OUTCOME: '${{ steps.ai.outcome }}'
          AI_BACKEND: '${{ steps.ai.outputs.backend_used }}'
          TRIGGER: '${{ inputs.trigger }}'
          ISSUE_NUMBER: '${{ inputs.issue_number || github.event.pull_request.number || github.event.issue.number }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const outcome = process.env.AI_OUTCOME;
            const backend = process.env.AI_BACKEND || 'unknown';
            const emoji = outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⏭️';
            core.info(`LLM backend=${backend} trigger=${process.env.TRIGGER} outcome=${outcome}`);
            await core.summary.addHeading('AI Invoke', 3)
              .addTable([
                [{data:'Trigger',header:true},{data:'Issue',header:true},{data:'Backend',header:true},{data:'Outcome',header:true}],
                [process.env.TRIGGER || 'unknown', `#${process.env.ISSUE_NUMBER}`, backend, `${emoji} ${outcome}`],
              ])
              .write();

      - name: 'Notify quota exhaustion'
        if: "steps.ai.outcome == 'failure'"
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          ISSUE_NUMBER: '${{ inputs.issue_number || github.event.pull_request.number || github.event.issue.number }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '⚠️ **AI unavailable** — all configured providers failed or have no API keys set. This issue will be retried automatically on the next scheduled run (08:00 UTC, Mon–Fri).',
            });
