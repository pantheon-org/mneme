name: '🏷️ AI Triage'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false
      current_labels:
        type: 'string'
        description: 'Comma-separated list of labels currently on the issue'
        required: false

concurrency:
  group: '${{ github.workflow }}-triage-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  triage:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'read'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4

      - name: 'Get repository labels'
        id: 'get_labels'
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        with:
          script: |-
            const labels = [];
            for await (const response of github.paginate.iterator(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })) {
              labels.push(...response.data);
            }

            if (!labels || labels.length === 0) {
              core.setFailed('There are no issue labels in this repository.')
            }

            const labelNames = labels.map(label => label.name).sort();
            core.setOutput('available_labels', labelNames.join(','));
            core.info(`Found ${labelNames.length} labels: ${labelNames.join(', ')}`);

      - name: 'Build prompt'
        id: 'build-prompt'
        if: "${{ steps.get_labels.outputs.available_labels != '' }}"
        uses: './.github/actions/build-prompt'
        with:
          workflow:           'triage'
          issue_title:        '${{ github.event.issue.title }}'
          issue_body:         '${{ github.event.issue.body }}'
          available_labels:   '${{ steps.get_labels.outputs.available_labels }}'
          current_labels:     '${{ inputs.current_labels }}'
          additional_context: '${{ inputs.additional_context }}'

      - name: 'Run AI'
        id: 'ai'
        if: "${{ steps.get_labels.outputs.available_labels != '' }}"
        uses: './.github/actions/ai-run'
        with:
          provider_order:     '${{ vars.AI_PROVIDER_ORDER }}'
          prompt:             '${{ steps.build-prompt.outputs.prompt }}'
          gemini_api_key:     '${{ secrets.GEMINI_API_KEY }}'
          gemini_model:       '${{ vars.GEMINI_MODEL || ''gemini-2.5-pro'' }}'
          anthropic_api_key:  '${{ secrets.ANTHROPIC_API_KEY }}'
          anthropic_model:    '${{ vars.ANTHROPIC_MODEL || ''claude-sonnet-4-6'' }}'
          cerebras_api_key:   '${{ secrets.CEREBRAS_API_KEY }}'
          cerebras_model:     '${{ vars.CEREBRAS_MODEL || ''gpt-oss-120b'' }}'
          mistral_api_key:    '${{ secrets.MISTRAL_API_KEY }}'
          mistral_model:      '${{ vars.MISTRAL_MODEL || ''mistral-large-latest'' }}'

      - name: 'Apply labels and post comment'
        if: steps.ai.outputs.summary != ''
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          AI_RESPONSE: '${{ steps.ai.outputs.summary }}'
          AI_BACKEND: '${{ steps.ai.outputs.backend_used }}'
          CURRENT_LABELS: '${{ inputs.current_labels }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const backend = process.env.AI_BACKEND || 'unknown';
            const raw = process.env.AI_RESPONSE?.trim() ?? '';
            core.info(`LLM backend=${backend} response_chars=${raw.length}`);

            let parsed;
            try {
              const jsonMatch = raw.match(/\{[\s\S]*\}/);
              parsed = JSON.parse(jsonMatch?.[0] || raw);
            } catch (e) {
              core.warning(`Could not parse ${backend} triage as JSON: ${e.message}\nRaw (first 500 chars): ${raw.slice(0, 500)}`);
              await core.summary.addHeading('AI Triage', 3)
                .addTable([[{data:'Backend',header:true},{data:'Parse',header:true}],[backend,`❌ ${e.message.slice(0,80)}`]])
                .write();
              return;
            }

            const currentLabels = process.env.CURRENT_LABELS?.split(',').filter(Boolean) ?? [];
            const blockedStatuses = ['status: wip', 'status: completed'];
            const statusBlocked = currentLabels.some(l => blockedStatuses.includes(l));

            // Remove status: new — always safe to do on first triage
            if (currentLabels.includes('status: new')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'status: new',
                });
              } catch (e) {
                core.info(`status: new not present or already removed: ${e.message}`);
              }
            }

            // Filter out status labels if the issue is wip or completed
            const labelsToApply = statusBlocked
              ? (parsed.labels ?? []).filter(l => !l.startsWith('status:'))
              : (parsed.labels ?? []);

            if (labelsToApply.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToApply,
              });
              core.info(`Applied labels: ${labelsToApply.join(', ')}`);
            }

            if (parsed.comment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 **Triage** (${backend})\n\n${parsed.comment}`,
              });
            }

            await core.summary.addHeading('AI Triage', 3)
              .addTable([
                [{data:'Backend',header:true},{data:'Response chars',header:true},{data:'Labels applied',header:true}],
                [backend, String(raw.length), labelsToApply.join(', ') || 'none'],
              ])
              .write();
