name: '🔎 AI Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4

      - name: 'Capture PR diff'
        id: 'pr_diff'
        run: |
          diff=$(gh pr diff ${{ github.event.pull_request.number }} 2>/dev/null | head -c 32000)
          {
            echo 'diff<<EOF'
            echo "$diff"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Build prompt'
        id: 'build-prompt'
        env:
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
          PR_DIFF: '${{ steps.pr_diff.outputs.diff }}'
        run: |
          {
            echo "prompt<<PROMPT_EOF"
            echo "You are reviewing a pull request for the mneme repository (vault-core), a Bun monorepo"
            echo "implementing persistent memory for AI coding agents."
            echo ""
            echo "Key conventions to enforce:"
            echo "- TypeScript strict mode (strict, exactOptionalPropertyTypes, noUncheckedIndexedAccess)"
            echo "- Bun runtime only: use bun:sqlite, bun:test - never better-sqlite3, Jest, or Vitest"
            echo "- NodeNext module resolution: .js extensions required in imports"
            echo "- Arrow functions preferred over function declarations"
            echo "- No comments in code unless logic is non-obvious"
            echo "- No unused imports"
            echo "- Max 110 non-blank lines per file"
            echo "- One exported function/class per module"
            echo "- import type for type-only imports"
            echo ""
            echo "PR diff:"
            printf '%s\n' "$PR_DIFF"
            echo ""
            echo "Provide a review covering:"
            echo "1. Summary of changes (2-3 sentences)"
            echo "2. Any violations of the conventions above"
            echo "3. Correctness concerns (memory model, atomic writes, non-blocking capture)"
            echo "4. Test coverage gaps"
            echo "5. Overall verdict: Approve / Request Changes / Comment"
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 'Run AI'
        id: 'ai'
        uses: './.github/actions/ai-run'
        with:
          provider_order:     '${{ vars.AI_PROVIDER_ORDER || ''gemini,cerebras,mistral'' }}'
          prompt:             '${{ steps.build-prompt.outputs.prompt }}'
          gemini_api_key:     '${{ secrets.GEMINI_API_KEY }}'
          gemini_model:       '${{ vars.GEMINI_MODEL || ''gemini-2.5-pro'' }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION || ''0'' }}'
          anthropic_api_key:  '${{ secrets.ANTHROPIC_API_KEY }}'
          anthropic_model:    '${{ vars.ANTHROPIC_MODEL || ''claude-sonnet-4-6'' }}'
          cerebras_api_key:   '${{ secrets.CEREBRAS_API_KEY }}'
          cerebras_model:     '${{ vars.CEREBRAS_MODEL || ''gpt-oss-120b'' }}'
          mistral_api_key:    '${{ secrets.MISTRAL_API_KEY }}'
          mistral_model:      '${{ vars.MISTRAL_MODEL || ''mistral-large-latest'' }}'

      - name: 'Write job summary'
        if: always()
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          AI_OUTCOME: '${{ steps.ai.outcome }}'
          AI_BACKEND: '${{ steps.ai.outputs.backend_used }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const outcome = process.env.AI_OUTCOME;
            const backend = process.env.AI_BACKEND || 'unknown';
            const emoji = outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⏭️';
            core.info(`LLM backend=${backend} outcome=${outcome}`);
            await core.summary.addHeading('AI Review', 3)
              .addTable([
                [{data:'Backend',header:true},{data:'Outcome',header:true}],
                [backend, `${emoji} ${outcome}`],
              ])
              .write();

      - name: 'Post AI review'
        if: steps.ai.outputs.summary != ''
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          AI_REVIEW: '${{ steps.ai.outputs.summary }}'
          AI_BACKEND: '${{ steps.ai.outputs.backend_used }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(process.env.PR_NUMBER),
              body: `🤖 **Review** (${process.env.AI_BACKEND || 'unknown'})\n\n${process.env.AI_REVIEW}`,
              event: 'COMMENT',
            });
