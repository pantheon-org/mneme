name: '🔍 AI Assess'

on:
  workflow_call:

concurrency:
  group: '${{ github.workflow }}-assess-${{ github.event_name }}-${{ github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  assess:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'read'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6' # v2

      - name: 'Build prompt'
        id: 'build-prompt'
        env:
          ISSUE_TITLE: '${{ github.event.issue.title }}'
          ISSUE_BODY: '${{ github.event.issue.body }}'
        run: bun run .github/scripts/prompt_assess.ts

      - name: 'Run AI'
        id: 'ai'
        uses: './.github/actions/ai-run'
        with:
          provider_order:     '${{ vars.AI_PROVIDER_ORDER || ''gemini,cerebras,mistral'' }}'
          prompt:             '${{ steps.build-prompt.outputs.prompt }}'
          gemini_api_key:     '${{ secrets.GEMINI_API_KEY }}'
          gemini_model:       '${{ vars.GEMINI_MODEL || ''gemini-2.5-pro'' }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION || ''0'' }}'
          anthropic_api_key:  '${{ secrets.ANTHROPIC_API_KEY }}'
          anthropic_model:    '${{ vars.ANTHROPIC_MODEL || ''claude-sonnet-4-6'' }}'
          cerebras_api_key:   '${{ secrets.CEREBRAS_API_KEY }}'
          cerebras_model:     '${{ vars.CEREBRAS_MODEL || ''gpt-oss-120b'' }}'
          mistral_api_key:    '${{ secrets.MISTRAL_API_KEY }}'
          mistral_model:      '${{ vars.MISTRAL_MODEL || ''mistral-large-latest'' }}'

      - name: 'Apply label and post assessment'
        if: steps.ai.outputs.summary != ''
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        env:
          AI_RESPONSE: '${{ steps.ai.outputs.summary }}'
          AI_BACKEND: '${{ steps.ai.outputs.backend_used }}'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            const backend = process.env.AI_BACKEND || 'unknown';
            const raw = process.env.AI_RESPONSE?.trim() ?? '';
            core.info(`LLM backend=${backend} response_chars=${raw.length}`);

            let parsed;
            try {
              const jsonMatch = raw.match(/\{[\s\S]*\}/);
              parsed = JSON.parse(jsonMatch?.[0] || raw);
            } catch (e) {
              core.warning(`Could not parse ${backend} assessment as JSON: ${e.message}\nRaw (first 500 chars): ${raw.slice(0, 500)}`);
              await core.summary.addHeading('AI Assess', 3)
                .addTable([[{data:'Backend',header:true},{data:'Parse',header:true}],[backend,`❌ ${e.message.slice(0,80)}`]])
                .write();
              return;
            }

            const validLabels = ['status: ready', 'status: needs-info'];
            if (parsed.label && validLabels.includes(parsed.label)) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [parsed.label],
                });
                core.info(`Applied label: ${parsed.label}`);
              } catch (e) {
                core.warning(`Could not apply label "${parsed.label}": ${e.message}. Ensure the label exists in the repository.`);
              }
            }

            if (parsed.reason) {
              const emoji = parsed.ready ? '✅' : '⏳';
              const heading = parsed.ready ? 'Ready to work' : 'Needs more info';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 **Assessment** (${backend}) — ${emoji} ${heading}\n\n${parsed.reason}`,
              });
            }

            await core.summary.addHeading('AI Assess', 3)
              .addTable([
                [{data:'Backend',header:true},{data:'Response chars',header:true},{data:'Ready',header:true},{data:'Label',header:true}],
                [backend, String(raw.length), parsed.ready ? '✅' : '⏳', parsed.label ?? 'n/a'],
              ])
              .write();
