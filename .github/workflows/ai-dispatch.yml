name: '🔀 AI Dispatch'

on:
  pull_request_review_comment:
    types:
      - 'created'
  pull_request_review:
    types:
      - 'submitted'
  pull_request:
    types:
      - 'opened'
  issues:
    types:
      - 'opened'
      - 'reopened'
  issue_comment:
    types:
      - 'created'

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'write'
  id-token: 'write'
  issues: 'write'
  pull-requests: 'write'

jobs:
  dispatch:
    # For PRs: only if not from a fork
    # For issues opened/reopened: always
    # For comments/reviews: only if user types @gemini-cli and is OWNER/MEMBER/COLLABORATOR
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'issues' && contains(fromJSON('["opened", "reopened"]'), github.event.action)) ||
      (github.event.sender.type == 'User' &&
      startsWith(github.event.comment.body || github.event.review.body || '', '@gemini-cli') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association || github.event.issue.author_association))
    runs-on: 'ubuntu-latest'
    outputs:
      command: '${{ steps.extract_command.outputs.command }}'
      request: '${{ steps.extract_command.outputs.request }}'
      additional_context: '${{ steps.extract_command.outputs.additional_context }}'
      current_labels: '${{ steps.extract_command.outputs.current_labels }}'
      issue_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
    steps:
      - name: 'Apply status: new label'
        if: "github.event_name == 'issues' && github.event.action == 'opened'"
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        with:
          script: |-
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['status: new'],
              });
            } catch (e) {
              core.warning(`Could not apply status: new: ${e.message}. Ensure the label exists in the repository.`);
            }

      - name: 'Extract command'
        id: 'extract_command'
        uses: 'actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd' # ratchet:actions/github-script@v8
        with:
          script: |-
            const body = context.payload.comment?.body
              || context.payload.review?.body
              || '';

            const match = body.match(/^@gemini-cli\s*(\/\S+)?\s*(.*)?$/s);
            const command = match?.[1] || '';
            const request = match?.[2]?.trim() || '';

            const labels = context.payload.issue?.labels?.map(l => l.name) || [];
            core.setOutput('current_labels', labels.join(','));

            let trigger = 'invoke';
            if (context.eventName === 'issues') trigger = 'triage';
            if (!body && context.eventName === 'pull_request') trigger = 'review';
            if (command === '/review') trigger = 'review';
            if (command === '/triage') trigger = 'triage';
            if (command === '/assess') trigger = 'assess';
            if (command === '/next') trigger = 'next';

            core.setOutput('command', trigger);
            core.setOutput('request', request);
            core.setOutput('additional_context', request);
            core.info(`Dispatching to: ${trigger}`);

  triage:
    needs: 'dispatch'
    if: "needs.dispatch.outputs.command == 'triage'"
    uses: './.github/workflows/ai-triage.yml'
    secrets: 'inherit'
    with:
      additional_context: '${{ needs.dispatch.outputs.additional_context }}'
      current_labels: '${{ needs.dispatch.outputs.current_labels }}'

  assess:
    needs: 'dispatch'
    if: >-
      (github.event_name == 'issues' && contains(fromJSON('["opened", "reopened"]'), github.event.action)) ||
      needs.dispatch.outputs.command == 'assess'
    uses: './.github/workflows/ai-assess.yml'
    secrets: 'inherit'

  review:
    needs: 'dispatch'
    if: "needs.dispatch.outputs.command == 'review'"
    uses: './.github/workflows/ai-review.yml'
    secrets: 'inherit'
    with:
      additional_context: '${{ needs.dispatch.outputs.additional_context }}'

  invoke:
    needs: 'dispatch'
    if: "needs.dispatch.outputs.command == 'invoke'"
    uses: './.github/workflows/ai-invoke.yml'
    secrets: 'inherit'
    with:
      additional_context: '${{ needs.dispatch.outputs.additional_context }}'
      trigger: 'comment'

  next:
    needs: 'dispatch'
    if: "needs.dispatch.outputs.command == 'next'"
    uses: './.github/workflows/ai-next.yml'
    secrets: 'inherit'
