pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "vault-core/**/*.{js,ts,tsx,json,jsonc}"
      run: bunx --bun biome check --write {staged_files}
      stage_fixed: true
      fail_text: "biome found issues that could not be auto-fixed"

    - name: markdownlint
      glob: "**/*.md"
      run: bunx markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
      fail_text: "markdownlint found issues that could not be auto-fixed"

    - name: actionlint
      glob: ".github/workflows/*.yml"
      run: mise exec actionlint -- actionlint {staged_files}
      fail_text: "actionlint found issues in GitHub Actions workflows"

pre-push:
  parallel: true
  jobs:
    - name: biome-check
      run: bunx --bun biome check vault-core/

    - name: markdownlint-check
      run: bunx markdownlint-cli2 "**/*.md" "#**/node_modules/**" "#vault-core/dist" "#.tessl" "#.context" "#.*/**"

    - name: typecheck
      glob: "vault-core/**/*.ts"
      root: vault-core
      run: bun run typecheck

    - name: test
      glob:
        - "vault-core/packages/core/src/__tests__/features/**/*.feature"
        - "vault-core/packages/core/src/__tests__/features/steps/**/*.ts"
      root: vault-core
      run: bun run test:bdd