name: 'AI Inference Fallback'
description: 'Calls Cerebras (gpt-oss-120b) then Mistral (mistral-large-latest) as fallback LLM backends'

inputs:
  prompt:
    description: 'The prompt to send to the model'
    required: true
  cerebras_api_key:
    description: 'Cerebras API key (CEREBRAS_API_KEY secret)'
    required: false
    default: ''
  mistral_api_key:
    description: 'Mistral API key (MISTRAL_API_KEY secret)'
    required: false
    default: ''

outputs:
  summary:
    description: 'The model response text'
    value: '${{ steps.cerebras.outputs.summary || steps.mistral.outputs.summary }}'
  backend_used:
    description: 'Which backend responded (cerebras or mistral)'
    value: '${{ steps.cerebras.outputs.backend_used || steps.mistral.outputs.backend_used }}'

runs:
  using: 'composite'
  steps:
    - name: 'Cerebras gpt-oss-120b'
      id: 'cerebras'
      if: inputs.cerebras_api_key != ''
      shell: 'python3 {0}'
      env:
        CEREBRAS_API_KEY: '${{ inputs.cerebras_api_key }}'
        PROMPT: '${{ inputs.prompt }}'
      run: |
        import json, os, sys, time, urllib.request, urllib.error

        prompt = os.environ.get('PROMPT', '').strip()
        api_key = os.environ.get('CEREBRAS_API_KEY', '').strip()
        github_output = os.environ.get('GITHUB_OUTPUT', '')

        payload = json.dumps({
            'model': 'gpt-oss-120b',
            'messages': [{'role': 'user', 'content': prompt}],
            'max_tokens': 4096,
            'temperature': 0,
        }).encode()

        req = urllib.request.Request(
            'https://api.cerebras.ai/v1/chat/completions',
            data=payload,
            headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
        )

        t0 = time.monotonic()
        try:
            with urllib.request.urlopen(req, timeout=120) as resp:
                result = json.loads(resp.read())
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            content = result['choices'][0]['message']['content']
            if github_output:
                with open(github_output, 'a') as f:
                    f.write(f'summary<<EOF\n{content}\nEOF\n')
                    f.write('backend_used=cerebras\n')
            print(f'backend=cerebras model=gpt-oss-120b elapsed_ms={elapsed_ms} prompt_chars={len(prompt)} response_chars={len(content)} status=ok', file=sys.stderr)
        except urllib.error.HTTPError as e:
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            body = e.read().decode()
            print(f'backend=cerebras model=gpt-oss-120b elapsed_ms={elapsed_ms} status=error http_code={e.code} body={body[:200]}', file=sys.stderr)
            sys.exit(1)
        except Exception as e:
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            print(f'backend=cerebras model=gpt-oss-120b elapsed_ms={elapsed_ms} status=error error={e}', file=sys.stderr)
            sys.exit(1)

    - name: 'Mistral mistral-large-latest'
      id: 'mistral'
      if: ${{ (steps.cerebras.outcome == 'failure' || steps.cerebras.outcome == 'skipped') && inputs.mistral_api_key != '' }}
      shell: 'python3 {0}'
      env:
        MISTRAL_API_KEY: '${{ inputs.mistral_api_key }}'
        PROMPT: '${{ inputs.prompt }}'
      run: |
        import json, os, sys, time, urllib.request, urllib.error

        prompt = os.environ.get('PROMPT', '').strip()
        api_key = os.environ.get('MISTRAL_API_KEY', '').strip()
        github_output = os.environ.get('GITHUB_OUTPUT', '')

        payload = json.dumps({
            'model': 'mistral-large-latest',
            'messages': [{'role': 'user', 'content': prompt}],
            'max_tokens': 4096,
            'temperature': 0,
        }).encode()

        req = urllib.request.Request(
            'https://api.mistral.ai/v1/chat/completions',
            data=payload,
            headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'},
        )

        t0 = time.monotonic()
        try:
            with urllib.request.urlopen(req, timeout=120) as resp:
                result = json.loads(resp.read())
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            content = result['choices'][0]['message']['content']
            if github_output:
                with open(github_output, 'a') as f:
                    f.write(f'summary<<EOF\n{content}\nEOF\n')
                    f.write('backend_used=mistral\n')
            print(f'backend=mistral model=mistral-large-latest elapsed_ms={elapsed_ms} prompt_chars={len(prompt)} response_chars={len(content)} status=ok', file=sys.stderr)
        except urllib.error.HTTPError as e:
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            body = e.read().decode()
            print(f'backend=mistral model=mistral-large-latest elapsed_ms={elapsed_ms} status=error http_code={e.code} body={body[:200]}', file=sys.stderr)
            sys.exit(1)
        except Exception as e:
            elapsed_ms = int((time.monotonic() - t0) * 1000)
            print(f'backend=mistral model=mistral-large-latest elapsed_ms={elapsed_ms} status=error error={e}', file=sys.stderr)
            sys.exit(1)
