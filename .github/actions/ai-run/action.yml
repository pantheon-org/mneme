name: AI Run
description: >
  Dispatch a prompt to the first available AI provider in provider_order.
  Providers with no API key are silently skipped.

inputs:
  provider_order:
    description: Comma-separated list of provider IDs (e.g. "gemini,anthropic,cerebras,mistral")
    required: true
  prompt:
    required: true
  gemini_api_key:
    required: false
    default: ''
  gemini_model:
    required: false
    default: 'gemini-2.5-pro'
  gemini_cli_version:
    required: false
    default: '0'
  anthropic_api_key:
    required: false
    default: ''
  anthropic_model:
    required: false
    default: 'claude-sonnet-4-6'
  cerebras_api_key:
    required: false
    default: ''
  cerebras_model:
    required: false
    default: 'gpt-oss-120b'
  mistral_api_key:
    required: false
    default: ''
  mistral_model:
    required: false
    default: 'mistral-large-latest'
  max_tokens:
    required: false
    default: '4096'

outputs:
  summary:
    description: The response text from the AI provider
    value: ${{ steps.dispatch.outputs.summary }}
  backend_used:
    description: Which provider produced the response
    value: ${{ steps.dispatch.outputs.backend_used }}

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: 'oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6' # v2

    - name: Install Gemini CLI
      if: contains(inputs.provider_order, 'gemini') && inputs.gemini_api_key != ''
      shell: bash
      run: npm install -g @google/gemini-cli@${{ inputs.gemini_cli_version || 'latest' }}

    - name: Dispatch
      id: dispatch
      shell: bash
      env:
        AI_PROVIDER_ORDER:  ${{ inputs.provider_order }}
        PROMPT:             ${{ inputs.prompt }}
        MAX_TOKENS:         ${{ inputs.max_tokens }}
        GEMINI_API_KEY:     ${{ inputs.gemini_api_key }}
        GEMINI_MODEL:       ${{ inputs.gemini_model }}
        GEMINI_CLI_VERSION: ${{ inputs.gemini_cli_version }}
        ANTHROPIC_API_KEY:  ${{ inputs.anthropic_api_key }}
        ANTHROPIC_MODEL:    ${{ inputs.anthropic_model }}
        CEREBRAS_API_KEY:   ${{ inputs.cerebras_api_key }}
        CEREBRAS_MODEL:     ${{ inputs.cerebras_model }}
        MISTRAL_API_KEY:    ${{ inputs.mistral_api_key }}
        MISTRAL_MODEL:      ${{ inputs.mistral_model }}
      run: bun run "${{ github.action_path }}/../../scripts/ai_run.ts"
