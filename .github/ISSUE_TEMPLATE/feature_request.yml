name: Feature Request
description: Propose a new capability or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@vault-core/types"
        - "@vault-core/core"
        - "@vault-core/cli"
        - "@vault-core/hook-claude-code"
        - "@vault-core/plugin-opencode"
        - "new package / cross-cutting"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or gap does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the new behavior look like?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? List testable conditions.
      placeholder: |
        - [ ] `vault-cli ...` outputs ...
        - [ ] BDD scenario T<nn> passes
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why (optional).
