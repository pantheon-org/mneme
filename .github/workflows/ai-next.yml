name: '⏭️ AI Next'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5' # 08:00 UTC, Monday–Friday
  workflow_call:

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'write'
  id-token: 'write'
  issues: 'write'
  pull-requests: 'write'

jobs:
  select:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions:
      contents: 'read'
      issues: 'read'
    outputs:
      issue_number: '${{ steps.pick.outputs.issue_number }}'
      issue_title: '${{ steps.pick.outputs.issue_title }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'
        with:
          sparse-checkout: '.github/scripts'
          sparse-checkout-cone-mode: false

      - name: 'Setup Bun'
        uses: 'oven-sh/setup-bun@v2'

      - name: 'Install script dependencies'
        run: 'bun install --frozen-lockfile'
        working-directory: '.github/scripts'

      - name: 'Pick highest-priority ready issue'
        id: 'pick'
        run: 'bun run .github/scripts/select-issue.ts'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'

  implement:
    needs: 'select'
    if: "needs.select.outputs.issue_number != ''"
    uses: './.github/workflows/ai-invoke.yml'
    secrets: 'inherit'
    with:
      trigger: 'implement'
      issue_number: '${{ needs.select.outputs.issue_number }}'
